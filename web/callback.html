<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <title>True Shuffle — Connecting…</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="callback-container">
    <div class="spinner"></div>
    <p id="callback-status">Connecting to Spotify…</p>
</div>

<script type="module">
    import { exchangeCode } from './js/auth.js';
    import { tokens, settings } from './js/storage.js';

    // Scopes the app needs in order to save playlists.
    const REQUIRED_SCOPES = [
        'playlist-modify-private',
        'playlist-modify-public',
    ];

    async function handleCallback() {
        const statusEl = document.getElementById('callback-status');

        const params = new URLSearchParams(window.location.search);
        const code   = params.get('code');
        const error  = params.get('error');

        if (error) {
            statusEl.textContent = `Login cancelled or denied: ${error}. Redirecting…`;
            setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            return;
        }

        if (!code) {
            statusEl.textContent = 'No authorization code received. Redirecting…';
            setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            return;
        }

        try {
            const clientId = settings.get().clientId;
            if (!clientId) throw new Error('Client ID not set. Please configure the app first.');

            statusEl.textContent = 'Exchanging authorization code…';
            const tokenData = await exchangeCode(code, clientId);

            // Verify Spotify actually granted the playlist scopes we requested.
            // If they're missing the user needs to log in again — do NOT save a
            // broken token that will just fail silently during playlist save.
            const granted = (tokenData.scope || '').split(' ');
            const missing = REQUIRED_SCOPES.filter(s => !granted.includes(s));
            if (missing.length > 0) {
                statusEl.textContent =
                    '⚠️ Spotify didn\'t grant playlist permissions. ' +
                    'Please go back and log in again — make sure to click ' +
                    '"Agree" on the Spotify permissions screen.';
                const retryLink = document.createElement('a');
                retryLink.href = 'index.html';
                retryLink.textContent = 'Back to app';
                retryLink.style.cssText = 'display:block;margin-top:20px;color:#1db954;font-size:16px;';
                document.getElementById('callback-container').appendChild(retryLink);
                return;  // do NOT save the token
            }

            tokens.save(tokenData);

            // Clear the code from the address bar before redirecting
            window.location.replace('index.html');
        } catch (e) {
            statusEl.textContent = `Login failed: ${e.message}`;
            const retryLink = document.createElement('a');
            retryLink.href = 'index.html';
            retryLink.textContent = 'Back to app';
            retryLink.style.cssText = 'display:block;margin-top:16px;color:#1db954;';
            document.getElementById('callback-container').appendChild(retryLink);
        }
    }

    handleCallback();
</script>
</body>
</html>
