<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glow filter — orange -->
    <filter id="glow-o" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter — purple -->
    <filter id="glow-p" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter — center orb -->
    <filter id="glow-c" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background radial gradient -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#3D1F96"/>
      <stop offset="45%"  stop-color="#1E0F52"/>
      <stop offset="100%" stop-color="#09060F"/>
    </radialGradient>
    <!-- Orange arrow gradient (left → right) -->
    <linearGradient id="og" x1="108" y1="0" x2="404" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF5500"/>
      <stop offset="50%"  stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <!-- Purple arrow gradient (right → left) -->
    <linearGradient id="pg" x1="404" y1="0" x2="108" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="40%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Center orb — outer white ring -->
    <radialGradient id="orb-w" cx="38%" cy="32%" r="58%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="75%"  stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.85"/>
    </radialGradient>
    <!-- Center orb — gold core -->
    <radialGradient id="orb-g" cx="32%" cy="26%" r="65%">
      <stop offset="0%"   stop-color="#FFF6C8"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8000"/>
    </radialGradient>
  </defs>

  <!-- ── Dark purple background ───────────────────────────────────────── -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- ── Concentric ring decorations ─────────────────────────────────── -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.22"/>
  <circle cx="256" cy="256" r="208" fill="none" stroke="#7C3AED" stroke-width="1"   stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#7C3AED" stroke-width="1"   stroke-opacity="0.09"/>

  <!-- Dots on outer ring (cardinal + diagonal) -->
  <circle cx="256" cy="18"  r="3.5" fill="#A78BFA" fill-opacity="0.55"/>
  <circle cx="256" cy="494" r="3.5" fill="#A78BFA" fill-opacity="0.55"/>
  <circle cx="18"  cy="256" r="3.5" fill="#A78BFA" fill-opacity="0.55"/>
  <circle cx="494" cy="256" r="3.5" fill="#A78BFA" fill-opacity="0.55"/>
  <circle cx="82"  cy="82"  r="2.5" fill="#A78BFA" fill-opacity="0.35"/>
  <circle cx="430" cy="82"  r="2.5" fill="#A78BFA" fill-opacity="0.35"/>
  <circle cx="82"  cy="430" r="2.5" fill="#A78BFA" fill-opacity="0.35"/>
  <circle cx="430" cy="430" r="2.5" fill="#A78BFA" fill-opacity="0.35"/>

  <!-- ── ORANGE upper wave — glow halo, then solid stroke ─────────────── -->
  <path d="M108,290C108,290 140,290 160,270C190,238 210,210 256,210C302,210 322,238 352,270C372,290 404,290 404,290"
        fill="none" stroke="#FF8800" stroke-width="56"
        stroke-linecap="round" stroke-opacity="0.4"
        filter="url(#glow-o)"/>
  <path d="M108,290C108,290 140,290 160,270C190,238 210,210 256,210C302,210 322,238 352,270C372,290 404,290 404,290"
        fill="none" stroke="url(#og)" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Orange arrowhead right -->
  <polygon points="388,268 424,290 388,312" fill="#FF9200" filter="url(#glow-o)"/>

  <!-- ── PURPLE lower wave — glow halo, then solid stroke ─────────────── -->
  <path d="M404,222C404,222 372,222 352,242C322,274 302,302 256,302C210,302 190,274 160,242C140,222 108,222 108,222"
        fill="none" stroke="#8B5CF6" stroke-width="56"
        stroke-linecap="round" stroke-opacity="0.45"
        filter="url(#glow-p)"/>
  <path d="M404,222C404,222 372,222 352,242C322,274 302,302 256,302C210,302 190,274 160,242C140,222 108,222 108,222"
        fill="none" stroke="url(#pg)" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Purple arrowhead left -->
  <polygon points="124,200 88,222 124,244" fill="#A855F7" filter="url(#glow-p)"/>

  <!-- ── Center orb ──────────────────────────────────────────────────── -->
  <!-- Warm glow halo -->
  <circle cx="256" cy="256" r="42" fill="#FF8C00" fill-opacity="0.55" filter="url(#glow-c)"/>
  <!-- White outer ring -->
  <circle cx="256" cy="256" r="32" fill="url(#orb-w)"/>
  <circle cx="256" cy="256" r="32" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.55"/>
  <!-- Gold core -->
  <circle cx="256" cy="256" r="20" fill="url(#orb-g)"/>
  <!-- Specular highlight -->
  <circle cx="248" cy="248" r="5.5" fill="white" fill-opacity="0.7"/>

  <!-- Crosshair ticks -->
  <line x1="256" y1="218" x2="256" y2="227" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="256" y1="285" x2="256" y2="294" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="218" y1="256" x2="227" y2="256" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="285" y1="256" x2="294" y2="256" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round"/>
</svg>
